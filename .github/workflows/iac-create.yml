name: IAC Cloudflare

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Plan and Apply
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: infra/iac/cloudflare/environments/prod

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_STATE_PROJECT: ${{ secrets.TF_STATE_PROJECT }}
      TF_STATE_STORAGE_ACCOUNT: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_RESOURCE_GROUP: ${{ secrets.TF_STATE_RESOURCE_GROUP }}
      TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}
      TF_STATE_SAS_TOKEN: ${{ secrets.TF_STATE_SAS_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_sas_url: ${{ secrets.SAS_URL }}
      TF_VAR_sas_token: ${{ secrets.SAS_TOKEN }}

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Checkout IaC repo
        uses: actions/checkout@v4
        with:
          repository: bensen-valoriz/sanity-nextjs
          ref: main
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: infra

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          required_vars=(
            TF_STATE_PROJECT
            TF_STATE_STORAGE_ACCOUNT
            TF_STATE_RESOURCE_GROUP
            TF_STATE_CONTAINER
            TF_STATE_SAS_TOKEN
            TF_VAR_cloudflare_api_token
            TF_VAR_cloudflare_account_id
          )

          missing=()
          for v in "${required_vars[@]}"; do
            [[ -n "${!v:-}" ]] || missing+=("${v}")
          done

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required secret values:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Terraform Init (dynamic backend)
        run: |
          STATE_KEY="nexus/tf-state-terraform/cloudflare/${TF_STATE_PROJECT}/prod/${TF_STATE_PROJECT}.terraform.tfstate"
          SAS_TOKEN="${TF_STATE_SAS_TOKEN#\?}"

          terraform init -reconfigure \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="sas_token=${SAS_TOKEN}" \
            -backend-config="key=${STATE_KEY}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve tfplan